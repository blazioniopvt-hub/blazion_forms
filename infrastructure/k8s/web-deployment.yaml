# ============================================
# Blazion Forms — Web Deployment
# Horizontally scalable Next.js frontend
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blazion-web
  namespace: blazion
  labels:
    app: blazion-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blazion-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: blazion-web
    spec:
      containers:
        - name: web
          image: ghcr.io/YOUR_ORG/blazion-forms/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.blazionforms.com"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: blazion-web
  namespace: blazion
spec:
  selector:
    app: blazion-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blazion-web-hpa
  namespace: blazion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blazion-web
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
