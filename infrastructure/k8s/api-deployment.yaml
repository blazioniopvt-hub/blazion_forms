# ============================================
# Blazion Forms — API Deployment
# Horizontally scalable NestJS backend
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blazion-api
  namespace: blazion
  labels:
    app: blazion-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: blazion-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: blazion-api
    spec:
      containers:
        - name: api
          image: ghcr.io/YOUR_ORG/blazion-forms/api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: blazion-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: REDIS_URL
              value: "redis://blazion-redis:6379"
            - name: FRONTEND_URL
              value: "https://blazionforms.com"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: blazion-api
  namespace: blazion
spec:
  selector:
    app: blazion-api
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP

---
# ── Horizontal Pod Autoscaler ──
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blazion-api-hpa
  namespace: blazion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blazion-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
